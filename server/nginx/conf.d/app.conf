# ---- HTTP: ACME challenge + redirect everything else to HTTPS ----
server {
    listen 80;
    server_name api.juroc.tech;

    # Let's Encrypt http-01 challenge files are served from here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: terminate TLS, proxy to the Node app ----
server {
    listen 443 ssl;
    server_name api.juroc.tech;

    ssl_certificate     /etc/letsencrypt/live/api.juroc.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.juroc.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Profile-picture / image uploads — raise from nginx's 1 MB default or
    # uploads will fail with 413 before they ever reach Express/Sharp.
    client_max_body_size 25M;

    # Resolve the app container via Docker's embedded DNS at REQUEST time, not
    # at startup. Using a variable in proxy_pass stops nginx from hard-failing
    # with "host not found in upstream" when app isn't resolvable the instant
    # nginx boots (startup race / app restart). 127.0.0.11 is Docker's resolver.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $trainee_app app:8000;

    location / {
        proxy_pass http://$trainee_app$request_uri;
        proxy_http_version 1.1;

        # Pass the real client IP through so Express `trust proxy` +
        # rate limiting see the actual user, not the nginx container.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
