version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trainee_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-change_me}
      POSTGRES_DB: ${DB_NAME:-trainee}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
