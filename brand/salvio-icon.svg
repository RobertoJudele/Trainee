<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Salvio">
  <title>Salvio app icon — pulse mark</title>
  <defs>
    <linearGradient id="salvioGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded squircle. For iOS export, fill the full square (corners are masked by the OS). -->
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#salvioGrad)"/>
  <!-- Pulse mark: heart-rate / performance / vital sign — one symbol across all verticals. -->
  <path d="M232 512 H404 L470 360 L548 680 L620 452 L676 512 H792"
        fill="none" stroke="#FFFFFF" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
